server:
  port: 8080

spring:
  application:
    name: traveloop-backend

  # ── Database ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:traveloop}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # ── Schema init from schema.sql and data.sql ──
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  # ── Email (SMTP) ──
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Spring AI — Gemini via OpenAI-compatible endpoint ──
  ai:
    openai:
      api-key: ${GEMINI_API_KEY:AIzaSyBijdj5aWLqdgYtSxIS_xMDqa5yMCFvy-4}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-2.0-flash
          temperature: 0.7

# ── JWT ──
app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 3600000 # 1 hour
    refresh-token-expiration-ms: 604800000 # 7 days

  # ── CORS ──
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

# ── Swagger / OpenAPI ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

# ── Logging ──
logging:
  level:
    com.traveloop: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
